<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}personal website of debarka kundu{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:title"
    content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
<meta property="og:description"
    content="{{ with .Description }}{{ . }}{{ else }}personal website of debarka kundu{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
